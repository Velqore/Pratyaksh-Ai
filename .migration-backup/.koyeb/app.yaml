name: pratyaksh-forensic-ai
services:
  - name: pratyaksh-app
    type: web
    git:
      branch: main
      build_command: npm run build
      run_command: npm start
    instance_type: nano
    autoscaling:
      min: 1
      max: 1
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
    healthcheck:
      grace_period: 30s
      interval: 30s
      restart_limit: 3
      timeout: 5s
      path: /api/ping
    ports:
      - port: 8080
        protocol: http
